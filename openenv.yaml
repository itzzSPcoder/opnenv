name: admission-helpdesk-openenv
version: 1.0.0
description: >-
  Real-world admissions support environment where an agent triages, routes,
  replies to, and closes student support tickets under SLA constraints.

tags:
  - openenv
  - customer-support
  - admissions
  - triage

entrypoint:
  python_module: app:app

environment:
  class_path: my_env_v4.MyEnvV4Env
  action_model: my_env_v4.MyEnvV4Action
  observation_model: my_env_v4.MyEnvV4Observation
  result_model: my_env_v4.MyEnvV4Result

graders:
  easy_priority_routing: "graders.grade_easy_priority_routing"
  medium_resolution: "graders.grade_medium_resolution"
  hard_sla_queue: "graders.grade_hard_sla_queue"
  easy_doc_status_followup: "graders.grade_easy_doc_status_followup"
  easy_hostel_change_request: "graders.grade_easy_hostel_change_request"
  medium_scholarship_appeal: "graders.grade_medium_scholarship_appeal"
  medium_deferral_process: "graders.grade_medium_deferral_process"
  hard_multi_channel_escalation: "graders.grade_hard_multi_channel_escalation"
  medium_fee_installment_plan: "graders.grade_medium_fee_installment_plan"
  hard_recheck_deadline_blocker: "graders.grade_hard_recheck_deadline_blocker"

task_graders:
  - task_id: easy_priority_routing
    task_name: easy_priority_routing
    grader: "graders.grade_easy_priority_routing"
    agent_grader: "graders:grade_easy_priority_routing"
  - task_id: medium_resolution
    task_name: medium_resolution
    grader: "graders.grade_medium_resolution"
    agent_grader: "graders:grade_medium_resolution"
  - task_id: hard_sla_queue
    task_name: hard_sla_queue
    grader: "graders.grade_hard_sla_queue"
    agent_grader: "graders:grade_hard_sla_queue"
  - task_id: easy_doc_status_followup
    task_name: easy_doc_status_followup
    grader: "graders.grade_easy_doc_status_followup"
    agent_grader: "graders:grade_easy_doc_status_followup"
  - task_id: easy_hostel_change_request
    task_name: easy_hostel_change_request
    grader: "graders.grade_easy_hostel_change_request"
    agent_grader: "graders:grade_easy_hostel_change_request"
  - task_id: medium_scholarship_appeal
    task_name: medium_scholarship_appeal
    grader: "graders.grade_medium_scholarship_appeal"
    agent_grader: "graders:grade_medium_scholarship_appeal"
  - task_id: medium_deferral_process
    task_name: medium_deferral_process
    grader: "graders.grade_medium_deferral_process"
    agent_grader: "graders:grade_medium_deferral_process"
  - task_id: hard_multi_channel_escalation
    task_name: hard_multi_channel_escalation
    grader: "graders.grade_hard_multi_channel_escalation"
    agent_grader: "graders:grade_hard_multi_channel_escalation"
  - task_id: medium_fee_installment_plan
    task_name: medium_fee_installment_plan
    grader: "graders.grade_medium_fee_installment_plan"
    agent_grader: "graders:grade_medium_fee_installment_plan"
  - task_id: hard_recheck_deadline_blocker
    task_name: hard_recheck_deadline_blocker
    grader: "graders.grade_hard_recheck_deadline_blocker"
    agent_grader: "graders:grade_hard_recheck_deadline_blocker"

tasks:
  - id: easy_priority_routing
    name: easy_priority_routing
    task_name: easy_priority_routing
    difficulty: easy
    description: Classify urgency and route one ticket to the correct team.
    score_range: [0.0, 1.0]
    grader: "graders.grade_easy_priority_routing"
    grader_fn: "graders.grade_easy_priority_routing"
    agent_grader: "graders:grade_easy_priority_routing"
    grader_colon: "graders:grade_easy_priority_routing"
  - id: medium_resolution
    name: medium_resolution
    task_name: medium_resolution
    difficulty: medium
    description: Route correctly and provide policy-safe response before closure.
    score_range: [0.0, 1.0]
    grader: "graders.grade_medium_resolution"
    grader_fn: "graders.grade_medium_resolution"
    agent_grader: "graders:grade_medium_resolution"
    grader_colon: "graders:grade_medium_resolution"
  - id: hard_sla_queue
    name: hard_sla_queue
    task_name: hard_sla_queue
    difficulty: hard
    description: Resolve a multi-ticket queue while managing SLAs and escalation.
    score_range: [0.0, 1.0]
    grader: "graders.grade_hard_sla_queue"
    grader_fn: "graders.grade_hard_sla_queue"
    agent_grader: "graders:grade_hard_sla_queue"
    grader_colon: "graders:grade_hard_sla_queue"
  - id: easy_doc_status_followup
    name: easy_doc_status_followup
    task_name: easy_doc_status_followup
    difficulty: easy
    description: Verify pending document status and provide admission-safe next steps.
    score_range: [0.0, 1.0]
    grader: "graders.grade_easy_doc_status_followup"
    grader_fn: "graders.grade_easy_doc_status_followup"
    agent_grader: "graders:grade_easy_doc_status_followup"
    grader_colon: "graders:grade_easy_doc_status_followup"
  - id: easy_hostel_change_request
    name: easy_hostel_change_request
    task_name: easy_hostel_change_request
    difficulty: easy
    description: Route a hostel change request and respond with safe policy guidance.
    score_range: [0.0, 1.0]
    grader: "graders.grade_easy_hostel_change_request"
    grader_fn: "graders.grade_easy_hostel_change_request"
    agent_grader: "graders:grade_easy_hostel_change_request"
    grader_colon: "graders:grade_easy_hostel_change_request"
  - id: medium_scholarship_appeal
    name: medium_scholarship_appeal
    task_name: medium_scholarship_appeal
    difficulty: medium
    description: Handle scholarship appeal workflow with valid routing and policy terms.
    score_range: [0.0, 1.0]
    grader: "graders.grade_medium_scholarship_appeal"
    grader_fn: "graders.grade_medium_scholarship_appeal"
    agent_grader: "graders:grade_medium_scholarship_appeal"
    grader_colon: "graders:grade_medium_scholarship_appeal"
  - id: medium_deferral_process
    name: medium_deferral_process
    task_name: medium_deferral_process
    difficulty: medium
    description: Guide admission deferral request with proper process and timeline language.
    score_range: [0.0, 1.0]
    grader: "graders.grade_medium_deferral_process"
    grader_fn: "graders.grade_medium_deferral_process"
    agent_grader: "graders:grade_medium_deferral_process"
    grader_colon: "graders:grade_medium_deferral_process"
  - id: hard_multi_channel_escalation
    name: hard_multi_channel_escalation
    task_name: hard_multi_channel_escalation
    difficulty: hard
    description: Resolve a complex queue under SLA pressure with correct escalation choices.
    score_range: [0.0, 1.0]
    grader: "graders.grade_hard_multi_channel_escalation"
    grader_fn: "graders.grade_hard_multi_channel_escalation"
    agent_grader: "graders:grade_hard_multi_channel_escalation"
    grader_colon: "graders:grade_hard_multi_channel_escalation"
  - id: medium_fee_installment_plan
    name: medium_fee_installment_plan
    task_name: medium_fee_installment_plan
    difficulty: medium
    description: Route installment-plan request and share policy-safe process details.
    score_range: [0.0, 1.0]
    grader: "graders.grade_medium_fee_installment_plan"
    grader_fn: "graders.grade_medium_fee_installment_plan"
    agent_grader: "graders:grade_medium_fee_installment_plan"
    grader_colon: "graders:grade_medium_fee_installment_plan"
  - id: hard_recheck_deadline_blocker
    name: hard_recheck_deadline_blocker
    task_name: hard_recheck_deadline_blocker
    difficulty: hard
    description: Handle deadline-critical admission blockers with escalation where required.
    score_range: [0.0, 1.0]
    grader: "graders.grade_hard_recheck_deadline_blocker"
    grader_fn: "graders.grade_hard_recheck_deadline_blocker"
    agent_grader: "graders:grade_hard_recheck_deadline_blocker"
    grader_colon: "graders:grade_hard_recheck_deadline_blocker"

api:
  reset: /reset
  step: /step
  state: /state
  close: /close
